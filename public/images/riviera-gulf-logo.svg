<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:ital@0;1&display=swap');
      .riviera-text {
        font-family: 'Cormorant Garamond', serif;
        font-size: 72px;
        font-style: italic;
        font-weight: 400;
        fill: #000;
        letter-spacing: -2px;
      }
      .gulf-text {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 700;
        fill: #000;
        letter-spacing: 4px;
      }
      .subtitle-text {
        font-family: 'Playfair Display', serif;
        font-size: 10px;
        font-weight: 400;
        fill: #666;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .accent-line {
        stroke: #c9a961;
        stroke-width: 2;
        fill: none;
      }
    </style>
  </defs>

  <!-- Accent line -->
  <line x1="80" y1="125" x2="180" y2="125" class="accent-line"/>

  <!-- Main text -->
  <text x="200" y="95" class="riviera-text" text-anchor="middle">Riviera</text>
  <text x="200" y="130" class="gulf-text" text-anchor="middle">GULF</text>
  <text x="200" y="160" class="subtitle-text" text-anchor="middle">PROPERTY MANAGEMENT</text>
</svg>